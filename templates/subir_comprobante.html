<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Subir Comprobante</title>
</head>
<body>

<h1>Subir Comprobante de Pago</h1>
<p>Usuario: {{ nombre }}</p>

{% if mensaje %}
    <p style="color:green;">{{ mensaje }}</p>
{% endif %}

<form method="post" enctype="multipart/form-data">

    <label>Selecciona el pago:</label><br>
    <select name="payment_id" required>
        {% for p in pagos %}
            <option value="{{ p.ID }}">
                Pago #{{ p.ID }} — S/ {{ p.Monto }} — {{ p.Fecha }}
            </option>
        {% endfor %}
    </select>

    <br><br>

    <label>Selecciona tu comprobante (JPG, PNG o PDF):</label><br><br>
    <input type="file" name="archivo" required><br><br>

    <button type="submit">Subir comprobante</button>
</form>

<br>
<a href="/dashboard">Volver al dashboard</a>

</body>
</html>
