{% extends "base.html" %}

{% block title %}Subir comprobante{% endblock %}

{% block extra_css %}

<style>

.upload-container{
display:flex;
justify-content:center;
margin-top:40px;
}

.upload-card{
width:500px;
background:white;
color:black;
padding:35px;
border-radius:18px;
box-shadow:0 20px 45px rgba(0,0,0,0.25);
}

.upload-card h2{
margin-bottom:10px;
}

.user-info{
margin-bottom:20px;
color:#444;
}

.form-group{
display:flex;
flex-direction:column;
margin-bottom:20px;
}

.form-group label{
margin-bottom:6px;
font-size:14px;
}

.form-group select,
.form-group input[type="file"]{
padding:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:14px;
}

.form-group select:focus{
outline:none;
border-color:var(--emerald);
box-shadow:0 0 0 2px rgba(80,200,120,0.2);
}

.success-box{
background:#e6ffe6;
color:#006600;
padding:12px;
border-radius:10px;
margin-bottom:20px;
}

.actions{
margin-top:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

</style>

{% endblock %}

{% block content %}

<div class="upload-container">

<div class="upload-card">

<h2>Subir comprobante de pago</h2>

<div class="user-info">
Usuario: <strong>{{ nombre }}</strong>
</div>

{% if mensaje %}
<div class="success-box">
{{ mensaje }}
</div>
{% endif %}

<form method="post" enctype="multipart/form-data">

<div class="form-group">

<label>Selecciona el pago</label>

<select name="payment_id" required>

{% for p in pagos %}

<option value="{{ p.ID }}">
Pago #{{ p.ID }} — S/ {{ p.Monto }} — {{ p.Fecha }}
</option>

{% endfor %}

</select>

</div>

<div class="form-group">

<label>Selecciona tu comprobante (JPG, PNG o PDF)</label>

<input type="file" name="archivo" required>

</div>

<button type="submit">
Subir comprobante
</button>

</form>

<div class="actions">

<a href="/dashboard">
<button class="btn-gold">Volver al dashboard</button>
</a>

</div>

</div>

</div>

{% endblock %}
