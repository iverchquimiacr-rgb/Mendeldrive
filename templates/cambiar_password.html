{% extends "base.html" %}

{% block title %}Cambiar contraseña{% endblock %}

{% block extra_css %}

<style>

/* =========================
CONTENEDOR
========================= */

.password-container{

display:flex;

justify-content:center;

margin-top:60px;

}

/* =========================
CARD
========================= */

.password-card{

width:420px;

background:white;

color:#0f172a;

padding:35px;

border-radius:18px;

box-shadow:0 20px 45px rgba(0,0,0,0.25);

}

/* =========================
TÍTULO
========================= */

.password-card h2{

margin-bottom:22px;

font-size:24px;

background:linear-gradient(
90deg,
var(--cyan),
var(--purple)
);

background-clip:text;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

/* =========================
FORMULARIO
========================= */

.form-group{

display:flex;

flex-direction:column;

margin-bottom:20px;

}

.form-group label{

margin-bottom:6px;

font-size:14px;

font-weight:500;

color:#374151;

}

.form-group input{

padding:12px;

border-radius:10px;

border:1px solid #d1d5db;

font-size:14px;

transition:all 0.2s ease;

}

/* INPUT FOCUS */

.form-group input:focus{

outline:none;

border-color:var(--cyan);

box-shadow:0 0 0 3px rgba(0,212,255,0.18);

}

/* =========================
BOTÓN
========================= */

.submit{

display:inline-block;

margin-top:20px;

padding:12px 26px;

font-weight:600;

color:white;

border:none;

cursor:pointer;

background:linear-gradient(
135deg,
var(--emerald),
var(--cyan)
);

border-radius:10px;

box-shadow:0 6px 14px rgba(0,0,0,0.2);

transition:all 0.25s ease;

}

/* HOVER */

.submit:hover{

transform:translateY(-3px);

box-shadow:0 12px 24px rgba(0,0,0,0.28);

}

/* =========================
ACCIONES
========================= */

.actions{

margin-top:20px;

display:flex;

justify-content:space-between;

align-items:center;

}

</style>

{% endblock %}

{% block content %}

<div class="password-container">

<div class="password-card">

<h2>🔐 Cambiar contraseña</h2>

<form method="POST">

<div class="form-group">

<label>Nueva contraseña</label>

<input type="password" name="password" required>

</div>

<button type="submit" class="submit">
Guardar nueva contraseña
</button>

</form>

<div class="actions">

</div>

</div>

</div>

{% endblock %}
