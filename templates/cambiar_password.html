{% extends "base.html" %}

{% block title %}Cambiar contraseña{% endblock %}

{% block extra_css %}

<style>

.password-container{
display:flex;
justify-content:center;
margin-top:50px;
}

.password-card{
width:420px;
background:white;
color:black;
padding:35px;
border-radius:18px;
box-shadow:0 20px 45px rgba(0,0,0,0.25);
}

.password-card h2{
margin-bottom:20px;
}

.form-group{
display:flex;
flex-direction:column;
margin-bottom:20px;
}

.form-group label{
margin-bottom:6px;
font-size:14px;
}

.form-group input{
padding:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:14px;
}

.form-group input:focus{
outline:none;
border-color:var(--emerald);
box-shadow:0 0 0 2px rgba(80,200,120,0.2);
}

.actions{
margin-top:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

</style>

{% endblock %}

{% block content %}

<div class="password-container">

<div class="password-card">

<h2>🔐 Cambiar contraseña</h2>

<form method="POST">

<div class="form-group">

<label>Nueva contraseña</label>

<input type="password" name="password" required>

</div>

<button type="submit">
Guardar nueva contraseña
</button>

</form>

<div class="actions">

<a href="/dashboard">
<button class="btn-gold">Volver</button>
</a>

</div>

</div>

</div>

{% endblock %}
