{% extends "base.html" %}
<style>
.btn-primary {
    display: inline-block;
    padding: 10px 20px;
    background-color: #0ea5e9; /* azul destacado */
    color: white;
    font-weight: 600;
    text-decoration: none;
    border-radius: 8px;
    transition: background 0.3s, transform 0.2s;
}

.btn-primary:hover {
    background-color: #0284c7; /* azul más oscuro al pasar el mouse */
    transform: translateY(-2px);
}
</style>
{% block title %}Cuenta creada{% endblock %}

{% block content %}

<div class="create-container">

<div class="create-card">

<h2>Cuenta creada correctamente</h2>

<p style="margin-top:20px;font-size:16px">

Tu <b>ID de usuario</b> es:

</p>

<div style="
font-size:28px;
font-weight:700;
margin:20px 0;
color:#0ea5e9;
text-align:center;
">
{{ user_id }}
</div>

<p style="text-align:center">

Guarda este ID.  
Lo necesitarás para iniciar sesión.

</p>

<div class="actions" style="justify-content:center">

    <a href="{{ url_for('login') }}" class="btn-primary">
        Ir al login
    </a>

</div>

</div>

</div>

{% endblock %}
