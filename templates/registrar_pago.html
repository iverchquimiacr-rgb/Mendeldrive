{% extends "base.html" %}

{% block title %}Registrar pago{% endblock %}

{% block extra_css %}

<style>

.payment-container{
display:flex;
justify-content:center;
margin-top:40px;
}

.payment-card{
width:420px;
background:white;
color:black;
padding:35px;
border-radius:18px;
box-shadow:0 20px 45px rgba(0,0,0,0.25);
}

.payment-card h2{
margin-bottom:10px;
}

.back-link{
display:inline-block;
margin-top:20px;
padding:10px 22px;
text-decoration:none;
color:white;
font-weight:600;

background:linear-gradient(135deg,var(--emerald),#2ecc71);

border-radius:10px;

box-shadow:0 5px 12px rgba(0,0,0,0.15);

transition:all 0.25s ease;
}

.back-link:hover{
transform:translateY(-3px);
box-shadow:0 10px 22px rgba(0,0,0,0.25);
background:linear-gradient(135deg,#3fdc84,#27ae60);
}

.user-info{
margin-bottom:25px;
font-size:15px;
color:#444;
}

.form-group{
display:flex;
flex-direction:column;
margin-bottom:20px;
}

.form-group label{
margin-bottom:6px;
font-size:14px;
}

.form-group input{
padding:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;
transition:0.25s;
}

.form-group input:focus{
outline:none;
border-color:var(--emerald);
box-shadow:0 0 0 2px rgba(80,200,120,0.2);
}

.submit{
display:inline-block;
margin-top:20px;
padding:12px 26px;
text-decoration:none;
font-weight:600;

color:white;
background:linear-gradient(135deg,var(--gold),#d4a017);

border-radius:10px;

box-shadow:0 6px 14px rgba(0,0,0,0.15);

transition:all 0.25s ease;
}

.submit:hover{
transform:translateY(-3px);
box-shadow:0 12px 24px rgba(0,0,0,0.25);
background:linear-gradient(135deg,#e6b800,#c99900);
}

.message-box{
background:#e6ffe6;
color:#006600;
padding:12px;
border-radius:10px;
margin-bottom:20px;
}

.actions{
margin-top:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

</style>

{% endblock %}

{% block content %}

<div class="payment-container">

<div class="payment-card">

<h2>Registrar pago</h2>

<div class="user-info">
Usuario: <strong>{{ nombre }}</strong>
</div>

{% if mensaje %}
<div class="message-box">
{{ mensaje }}
</div>
{% endif %}

<form method="POST">

<div class="form-group">
<label>Monto pagado (S/)</label>
<input type="number" step="0.01" name="monto" required>
</div>

<button type="submit" class="submit">
Registrar pago
</button>

</form>

<div class="actions">

<a class="back-link" href="/dashboard">
⬅ Volver al panel
</a>

</div>

</div>

</div>

{% endblock %}
