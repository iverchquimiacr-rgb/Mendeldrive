{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block extra_css %}

<style>

.login-container{
display:flex;
justify-content:center;
align-items:center;
min-height:70vh;
}

.login-card{
width:380px;
background:white;
color:black;
padding:40px;
border-radius:18px;
box-shadow:0 20px 45px rgba(0,0,0,0.25);
animation:fadeIn 0.6s ease;
}

.login-card h2{
text-align:center;
margin-bottom:25px;
}

.form-group{
margin-bottom:20px;
display:flex;
flex-direction:column;
}

.form-group label{
font-size:14px;
margin-bottom:6px;
font-weight:500;
}

.form-group input{
padding:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:14px;
transition:0.25s;
}

.form-group input:focus{
outline:none;
border-color:var(--emerald);
box-shadow:0 0 0 2px rgba(80,200,120,0.2);
}

.btn-primary{
width:100%;
margin-top:10px;
}

.error-box{
background:#ffdddd;
color:#b30000;
padding:12px;
border-radius:10px;
margin-bottom:20px;
font-size:14px;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

{% endblock %}

{% block content %}

<div class="login-container">

<div class="login-card">

<h2>Iniciar sesión</h2>

{% if error %}
<div class="error-box">
{{ error }}
</div>
{% endif %}

<form method="post">

<div class="form-group">
<label>ID de usuario</label>
<input type="number" name="user_id" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" name="password" required>
</div>

<button type="submit" class="btn-primary">
Ingresar
</button>

</form>

</div>

</div>

{% endblock %}
