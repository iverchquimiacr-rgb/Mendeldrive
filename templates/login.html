{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block extra_css %}

<style>

/* =========================
CONTENEDOR
========================= */

.login-container{
display:flex;
justify-content:center;
align-items:center;
min-height:70vh;
}

/* =========================
CARD
========================= */

.login-card{

width:380px;

background:white;

color:#0f172a;

padding:40px;

border-radius:18px;

box-shadow:0 20px 45px rgba(0,0,0,0.25);

animation:fadeIn 0.6s ease;

}

/* =========================
TÍTULO
========================= */

.login-card h2{

text-align:center;

margin-bottom:25px;

font-size:26px;

background:linear-gradient(
90deg,
var(--cyan),
var(--purple)
);

background-clip:text;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

/* =========================
FORMULARIO
========================= */

.form-group{

margin-bottom:20px;

display:flex;

flex-direction:column;

}

.form-group label{

font-size:14px;

margin-bottom:6px;

font-weight:500;

color:#374151;

}

.form-group input{

padding:12px;

border-radius:10px;

border:1px solid #d1d5db;

font-size:14px;

transition:all 0.2s ease;

}

/* INPUT FOCUS */

.form-group input:focus{

outline:none;

border-color:var(--cyan);

box-shadow:0 0 0 3px rgba(0,212,255,0.18);

}

/* =========================
BOTÓN
========================= */

.btn-primary{

width:100%;

margin-top:10px;

padding:12px;

border:none;

border-radius:10px;

font-weight:600;

color:white;

cursor:pointer;

background:linear-gradient(
135deg,
var(--emerald),
var(--cyan)
);

box-shadow:0 6px 16px rgba(0,0,0,0.2);

transition:all 0.25s ease;

}

.btn-primary:hover{

transform:translateY(-2px);

box-shadow:0 12px 26px rgba(0,0,0,0.25);

}

/* =========================
ERROR
========================= */

.error-box{

background:#fee2e2;

color:#991b1b;

padding:12px;

border-radius:10px;

margin-bottom:20px;

font-size:14px;

border-left:4px solid #ef4444;

}

/* =========================
ANIMACIÓN
========================= */

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

{% endblock %}

{% block content %}

<div class="login-container">

<div class="login-card">

<h2>Iniciar sesión</h2>

{% if error %}
<div class="error-box">
{{ error }}
</div>
{% endif %}

<form method="post">

<div class="form-group">
<label>ID de usuario</label>
<input type="number" name="user_id" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" name="password" required>
</div>

<button type="submit" class="btn-primary">
Ingresar
</button>

</form>

</div>

</div>

{% endblock %}
