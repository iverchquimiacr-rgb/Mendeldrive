{% extends "base.html" %}

{% block title %}Crear usuario{% endblock %}

{% block extra_css %}

<style>

.create-container{
display:flex;
justify-content:center;
margin-top:40px;
}

.create-card{
width:420px;
background:white;
color:black;
padding:35px;
border-radius:18px;
box-shadow:0 20px 45px rgba(0,0,0,0.25);
}

.create-card h2{
margin-bottom:20px;
}

.back-link{
display:inline-block;
margin-top:20px;
padding:10px 22px;
text-decoration:none;
color:white;
font-weight:600;

background:linear-gradient(135deg,var(--emerald),#2ecc71);

border-radius:10px;

box-shadow:0 5px 12px rgba(0,0,0,0.15);

transition:all 0.25s ease;
}

.back-link:hover{
transform:translateY(-3px);
box-shadow:0 10px 22px rgba(0,0,0,0.25);
background:linear-gradient(135deg,#3fdc84,#27ae60);
}

.submit{
display:inline-block;
margin-top:20px;
padding:12px 26px;
text-decoration:none;
font-weight:600;

color:white;
background:linear-gradient(135deg,var(--gold),#d4a017);

border-radius:10px;

box-shadow:0 6px 14px rgba(0,0,0,0.15);

transition:all 0.25s ease;
}

.submit:hover{
transform:translateY(-3px);
box-shadow:0 12px 24px rgba(0,0,0,0.25);
background:linear-gradient(135deg,#e6b800,#c99900);
}

.form-group{
display:flex;
flex-direction:column;
margin-bottom:18px;
}

.form-group label{
margin-bottom:6px;
font-size:14px;
}

.form-group input,
.form-group select{
padding:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:14px;
}

.form-group input:focus,
.form-group select:focus{
outline:none;
border-color:var(--emerald);
box-shadow:0 0 0 2px rgba(80,200,120,0.2);
}

.actions{
margin-top:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

</style>

{% endblock %}

{% block content %}

<div class="create-container">

<div class="create-card">

<h2>Crear nuevo usuario</h2>

<form method="POST">

<div class="form-group">

<label>Nombre</label>

<input type="text" name="nombre" required>

</div>

<div class="form-group">

<label>Contraseña</label>

<input type="password" name="password" required>

</div>

<div class="form-group">

<label>Rol</label>

<select name="rol">

<option value="Usuario">Usuario</option>
<option value="Admin">Admin</option>

</select>

</div>

<button type="submit" class="submit">
Crear usuario
</button>

</form>

<div class="actions">

<a class="back-link" href="/dashboard">
⬅ Volver al panel
</a>

</div>

</div>

</div>

{% endblock %}
