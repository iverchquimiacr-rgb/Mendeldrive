<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>{% block title %}NovusPrep{% endblock %}</title>

<!-- TIPOGRAFÍA PROFESIONAL -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- FAVICON -->
<link rel="icon" href="{{ url_for('static', filename='assets/icon.png') }}">

<style>

/* =========================
PALETA NOVUSPREP
========================= */

:root{

--primary:#22c55e;
--primary-dark:#16a34a;

--accent:#6366f1;
--accent-2:#06b6d4;

--bg-dark:#0f172a;
--bg-dark-2:#020617;

--bg-card:#ffffff;

--text-light:#cbd5f5;
--text-muted:#94a3b8;

}

/* =========================
RESET
========================= */

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:"Inter",sans-serif;

}

body{

background:linear-gradient(
135deg,
var(--bg-dark),
var(--bg-dark-2)
);

color:white;

min-height:100vh;

}

/* =========================
NAVBAR
========================= */

.navbar{

background:#020617;

border-bottom:1px solid rgba(255,255,255,0.05);

padding:14px 30px;

display:flex;
align-items:center;
justify-content:space-between;

box-shadow:0 5px 20px rgba(0,0,0,0.4);

}

/* =========================
LOGO
========================= */

.logo{

display:flex;
align-items:center;
gap:10px;

font-weight:700;
font-size:18px;

color:white;

}

.logo img{

height:34px;

}

/* =========================
NAV LINKS
========================= */

.nav-links{

display:flex;
gap:20px;

}

.nav-links a{

text-decoration:none;
color:var(--text-light);

font-size:14px;
font-weight:500;

padding:6px 10px;
border-radius:8px;

transition:0.25s;

}

.nav-links a:hover{

background:rgba(255,255,255,0.08);
color:white;

}

/* =========================
CONTENEDOR PRINCIPAL
========================= */

.main-container{

max-width:1100px;

margin:40px auto;

padding:0 20px;

}

/* =========================
CARDS (NO CAMBIADO)
========================= */

.card{

background:white;
color:black;
padding:35px;
border-radius:18px;

box-shadow:0 20px 50px rgba(0,0,0,0.35);

}

/* =========================
BOTONES
========================= */

.btn-primary{

background:linear-gradient(
135deg,
var(--primary),
var(--accent-2)
);

border:none;
color:white;

padding:10px 18px;

border-radius:10px;

font-weight:600;

cursor:pointer;

transition:0.2s;

}

.btn-primary:hover{

transform:translateY(-2px);

box-shadow:0 8px 25px rgba(0,0,0,0.35);

}

.btn-secondary{

background:var(--accent);

border:none;

color:white;

padding:8px 16px;

border-radius:10px;

cursor:pointer;

}

/* =========================
TABLAS
========================= */

.table-modern{

width:100%;

border-collapse:collapse;

margin-top:20px;

background:white;

color:black;

border-radius:10px;

overflow:hidden;

}

.table-modern th{

background:#020617;

color:white;

padding:12px;

font-size:14px;

}

.table-modern td{

padding:12px;

border-bottom:1px solid #eee;

text-align:center;

}

.table-modern tr:hover{

background:#f7f7f7;

}

/* =========================
FORMULARIOS
========================= */

.form-group{

margin-bottom:18px;

}

.form-group label{

display:block;

font-size:14px;

margin-bottom:5px;

color:black;

}

.form-group input,
.form-group select{

width:100%;

padding:10px;

border-radius:8px;

border:1px solid #ddd;

}

/* =========================
BADGES
========================= */

.badge-green{

background:#22c55e;

color:white;

padding:4px 10px;

border-radius:8px;

font-size:12px;

}

.badge-yellow{

background:#ffc107;

color:black;

padding:4px 10px;

border-radius:8px;

font-size:12px;

}

.badge-red{

background:#ef4444;

color:white;

padding:4px 10px;

border-radius:8px;

font-size:12px;

}

/* =========================
MENSAJES
========================= */

.message-success{

background:#e8f7ee;

color:#1e7e34;

padding:10px;

border-radius:8px;

margin-bottom:15px;

}

.message-error{

background:#fdeaea;

color:#c0392b;

padding:10px;

border-radius:8px;

margin-bottom:15px;

}

/* =========================
FOOTER
========================= */

.footer{

margin-top:60px;

text-align:center;

font-size:13px;

color:var(--text-muted);

}

/* =========================
RESPONSIVE
========================= */

@media(max-width:800px){

.nav-links{

display:none;

}

.main-container{

margin:20px auto;

}

}

</style>

{% block extra_css %}{% endblock %}

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">

<img src="{{ url_for('static', filename='assets/logo.png') }}">

<span>NovusPrep</span>

</div>

{% if session.get("user_id") %}

<div class="nav-links">

{% if session.get("rol") == "Admin" %}

<a href="/admin/usuarios">Usuarios</a>
<a href="/admin/pagos">Pagos</a>

{% endif %}

<a href="/logout">Salir</a>

</div>

{% endif %}

</div>


<!-- CONTENIDO -->

<div class="main-container">

{% block content %}
{% endblock %}

</div>


<!-- FOOTER -->

<div class="footer">

© 2026 NovusPrep — Quality and confidence forever

</div>

</body>

</html>
