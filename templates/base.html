<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>{% block title %}Sistema{% endblock %}</title>

<style>

/* =========================
VARIABLES DE COLOR
========================= */

:root{
--emerald:#50C878;
--green:#00bb2d;
--gold:#FFD700;
--cyan:#00FFFF;
--indigo:#403F6F;
}

/* =========================
RESET
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Roboto,Arial;
}

body{
background:linear-gradient(135deg,#0f0f0f,#1b1b1b);
color:white;
min-height:100vh;
}

/* =========================
NAVBAR
========================= */

.navbar{

background:#111;
padding:14px 30px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

.logo{

font-size:22px;
font-weight:bold;

background:linear-gradient(90deg,var(--gold),var(--emerald));
background-clip: text;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;

}

.nav-links{

display:flex;
gap:18px;
}

.nav-links a{

text-decoration:none;
color:white;
font-size:14px;
padding:6px 10px;
border-radius:8px;
transition:0.25s;

}

.nav-links a:hover{

background:rgba(255,255,255,0.08);

}

/* =========================
CONTENEDOR
========================= */

.main-container{

max-width:1100px;
margin:40px auto;
padding:0 20px;

}

/* =========================
CARDS
========================= */

.card{

background:white;
color:black;
padding:35px;
border-radius:18px;

box-shadow:0 20px 50px rgba(0,0,0,0.35);

}

/* =========================
BOTONES
========================= */

.btn-primary{

background:linear-gradient(135deg,var(--emerald),var(--green));
border:none;
color:white;
padding:10px 18px;
border-radius:10px;
font-weight:600;
cursor:pointer;
transition:0.2s;

}

.btn-primary:hover{

transform:translateY(-2px);
box-shadow:0 8px 20px rgba(0,0,0,0.35);

}

.btn-secondary{

background:var(--indigo);
border:none;
color:white;
padding:8px 16px;
border-radius:10px;
cursor:pointer;

}

/* =========================
TABLAS MODERNAS
========================= */

.table-modern{

width:100%;
border-collapse:collapse;
margin-top:20px;

}

.table-modern th{

background:#111;
color:white;
padding:12px;
font-size:14px;

}

.table-modern td{

padding:12px;
border-bottom:1px solid #eee;
text-align:center;

}

.table-modern tr:hover{

background:#f7f7f7;

}

/* =========================
FORMULARIOS
========================= */

.form-group{

margin-bottom:18px;

}

.form-group label{

display:block;
font-size:14px;
margin-bottom:5px;

}

.form-group input,
.form-group select{

width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;

}

/* =========================
BADGES
========================= */

.badge-green{

background:#00bb2d;
color:white;
padding:4px 10px;
border-radius:8px;
font-size:12px;

}

.badge-yellow{

background:#ffc107;
color:black;
padding:4px 10px;
border-radius:8px;
font-size:12px;

}

.badge-red{

background:#d9534f;
color:white;
padding:4px 10px;
border-radius:8px;
font-size:12px;

}

/* =========================
MENSAJES
========================= */

.message-success{

background:#e8f7ee;
color:#1e7e34;
padding:10px;
border-radius:8px;
margin-bottom:15px;

}

.message-error{

background:#fdeaea;
color:#c0392b;
padding:10px;
border-radius:8px;
margin-bottom:15px;

}

/* =========================
RESPONSIVE
========================= */

@media(max-width:800px){

.nav-links{
display:none;
}

.main-container{
margin:20px auto;
}

}

</style>
{% block extra_css %}{% endblock %}

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">
Sistema
</div>

{% if session.get("user_id") %}

<div class="nav-links">

<a href="/dashboard">Dashboard</a>

<a href="/catalogo">Catálogo</a>

<a href="/perfil">Perfil</a>

{% if session.get("rol") == "Admin" %}

<a href="/admin/usuarios">Usuarios</a>
<a href="/admin/pagos">Pagos</a>

{% else %}

<a href="/mis_pagos">Mis pagos</a>

{% endif %}

<a href="/logout">Salir</a>

</div>

{% endif %}

</div>


<!-- CONTENIDO -->

<div class="main-container">

{% block content %}

{% endblock %}

</div>

</body>
</html>
