{% extends "base.html" %}

{% block title %}Contraseña generada{% endblock %}

{% block extra_css %}

<style>

.reset-container{
max-width:600px;
margin:60px auto;
}

.reset-card{
background:white;
color:black;
padding:40px;
border-radius:18px;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
text-align:center;
}

.reset-title{
font-size:26px;
margin-bottom:15px;
}

.reset-warning{
font-size:14px;
margin-bottom:25px;
color:#666;
}

.password-box{
background:#111;
color:#FFD700;
padding:20px;
border-radius:12px;
font-size:26px;
font-weight:bold;
letter-spacing:2px;
margin:20px 0;
}

.note{
font-size:14px;
color:#444;
margin-bottom:30px;
}

.back-btn{
padding:12px 20px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,var(--emerald),var(--green));
color:white;
font-weight:600;
cursor:pointer;
transition:0.25s;
}

.back-btn:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

</style>

{% endblock %}

{% block content %}

<div class="reset-container">

<div class="reset-card">

<div class="reset-title">
🔐 Contraseña temporal generada
</div>

<p class="reset-warning">
Esta contraseña se muestra <strong>una sola vez</strong>.
</p>

<div class="password-box">
{{ password }}
</div>

<p class="note">
El usuario deberá cambiarla al iniciar sesión.
</p>

<a href="/admin/usuario/{{ user_id }}">
<button class="back-btn">
⬅ Volver al perfil
</button>
</a>

</div>

</div>

{% endblock %}
