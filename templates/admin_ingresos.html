{% extends "base.html" %}

{% block title %}Ingresos{% endblock %}

{% block extra_css %}
<style>

.catalog-container{
margin-top:30px;
}

.catalog-header{
margin-bottom:20px;
}

.catalog-header p{
color:rgba(255,255,255,0.8);
}

.catalog-table{
width:100%;
border-collapse:collapse;
background:white;
color:black;
border-radius:16px;
overflow:hidden;
box-shadow:0 20px 45px rgba(0,0,0,0.25);
}

.catalog-table th{
background:linear-gradient(135deg,var(--emerald),var(--green));
color:white;
padding:14px;
text-align:left;
font-size:14px;
}

.catalog-table td{
padding:14px;
border-bottom:1px solid #eee;
font-size:14px;
}

.catalog-table tr:hover{
background:#f6f6f6;
}

.badge-paid{
background:#ffd70033;
color:#b58b00;
padding:6px 10px;
border-radius:8px;
font-size:12px;
font-weight:600;
}

.badge-free{
background:#00bb2d22;
color:#007a1c;
padding:6px 10px;
border-radius:8px;
font-size:12px;
font-weight:600;
}

.drive-btn{
padding:8px 14px;
border-radius:8px;
background:linear-gradient(135deg,var(--indigo),var(--emerald));
color:white;
text-decoration:none;
font-size:13px;
font-weight:500;
transition:0.3s;
}

.drive-btn:hover{
transform:translateY(-2px);
box-shadow:0 5px 12px rgba(0,0,0,0.25);
}

.actions{
margin-top:20px;
}

.chart-container{
margin-top:30px;
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

</style>
{% endblock %}

{% block content %}

<div class="catalog-container">

<h2>Ingresos del sistema</h2>

<h3>Total ingresos: S/ {{ total }}</h3>

<div class="chart-container">
<canvas id="incomeChart"></canvas>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const labels = JSON.parse('{{ labels | tojson | safe }}');
const data = JSON.parse('{{ valores | tojson | safe }}');

const ctx = document.getElementById("incomeChart").getContext("2d");

new Chart(ctx, {
    type: "line",
    data: {
        labels: labels,
        datasets: [{
            label: "Ingresos mensuales",
            data: data,
            borderWidth: 3,
            fill: false,
            tension: 0.3
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                display: true
            }
        },
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});

</script>

{% endblock %}
